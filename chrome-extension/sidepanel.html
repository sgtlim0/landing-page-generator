<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Research Assistant</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>AI 리서치 어시스턴트</h1>
    <p>제품 심층 리서치 &amp; 카피 분석</p>
  </div>

  <!-- AWS Credentials (collapsible) -->
  <div class="cred-section">
    <div class="cred-toggle" id="credToggle">
      AWS Credentials <span class="cred-status" id="credStatus"></span>
    </div>
    <div class="cred-body" id="credBody">
      <div class="row" style="margin-bottom:0.4rem;">
        <div class="field">
          <label>Access Key ID</label>
          <input type="text" id="aws_access_key" placeholder="AKIA..." autocomplete="off">
        </div>
        <div class="field">
          <label>Secret Access Key</label>
          <input type="password" id="aws_secret_key" placeholder="secret key" autocomplete="off">
        </div>
      </div>
      <div class="field" style="margin-bottom:0.4rem;">
        <label>Region</label>
        <select id="aws_region">
          <option value="us-east-1" selected>us-east-1 (N. Virginia)</option>
          <option value="us-west-2">us-west-2 (Oregon)</option>
          <option value="eu-west-1">eu-west-1 (Ireland)</option>
          <option value="ap-northeast-1">ap-northeast-1 (Tokyo)</option>
        </select>
      </div>
      <div class="cred-actions">
        <button class="btn-save" id="credSaveBtn">저장</button>
        <button id="credClearBtn">초기화</button>
      </div>
    </div>
  </div>

  <!-- Chat Messages Area -->
  <div class="chat-container" id="chatContainer">
    <div class="chat-welcome">
      <div class="welcome-icon">&#128269;</div>
      <h2>심층 리서치</h2>
      <p>제품이나 서비스에 대해 자유롭게 설명하면 AI가 심층 리서치를 수행합니다.</p>
    </div>
  </div>

  <!-- Bottom Fixed Search Bar -->
  <div class="input-area">
    <form id="researchForm">
      <div class="search-bar">
        <textarea id="queryInput" rows="1" placeholder="제품이나 서비스에 대해 물어보세요..." required></textarea>
        <button type="submit" class="search-btn" id="submitBtn" title="리서치 시작">
          <span class="search-icon">&#128269;</span>
        </button>
      </div>
    </form>
  </div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
